watchlist:
  - {symbol: SPY, name: "S&P 500 ETF"}
  - {symbol: QQQ, name: "Nasdaq 100 ETF"}
  - {symbol: AAPL, name: Apple}
  - {symbol: TSLA, name: Tesla}
  - {symbol: NVDA, name: NVIDIA}
  - {symbol: META, name: Meta}
  - {symbol: AMD, name: AMD}
  - {symbol: AMZN, name: Amazon}

volume_profile:
  lookback_trading_days: 5
  value_area_pct: 0.70
  min_trading_days: 3
  recency_decay: 0.15

rvol:
  skip_open_minutes: 3
  lookback_days: 10

regime:
  gap_and_go_rvol: 1.5        # static fallback
  trend_day_rvol: 1.2
  fade_chop_rvol: 1.0
  market_context_symbols: [SPY, QQQ]
  adaptive:
    enabled: true
    gap_and_go_percentile: 85
    trend_day_percentile: 60
    fade_chop_percentile: 30
    min_sample_days: 5
    min_trend_day_floor: 1.0
    gap_significance_threshold: 0.3
  stability:
    rvol_hysteresis: 0.10               # L1 RVOL threshold 偏移比例
    cross_family_cooldown_minutes: 15   # TREND↔FADE family alert 最小间隔
  structure_trend:
    enabled: true
    window: 15              # Layer 2 window size (bars = minutes with 1m)
    min_windows: 3          # Layer 2 minimum window count
    consistency: 0.67       # Layer 2 direction consistency threshold
    fast_min_bars: 20       # Layer 1 minimum bar count
    fast_side_pct: 0.80     # Layer 1 VWAP side cross-validation ratio
    fast_r2_min: 0.70       # Layer 1 close regression R² entry gate
    # flat_threshold: DEPRECATED — no longer used as L1 gate (kept for config compat)
  index_consistency_enabled: true

filters:
  calendar_file: "config/us_calendar.yaml"
  inside_day_rvol_threshold: 0.8

gamma_wall:
  enabled: true
  use_weekly_expiry: true
  max_distance_pct: 10        # exclude gamma walls >10% from current price in level dict
  adverse_warning:
    max_pain_adr_ratio: 0.5   # MaxPain 偏离阈值 = ADR * ratio
    wall_proximity_adr_ratio: 0.3  # Wall 靠墙阈值 = ADR * ratio

auto_scan:
  enabled: true
  interval_seconds: 180
  morning_window: ["09:40", "11:30"]
  afternoon_window: ["13:00", "15:00"]
  breakout:
    min_confidence: 0.70
    min_rvol: 1.30
    min_magnitude_pct: 0.20
    volume_surge_threshold: 2.0
    volume_surge_bars: 5
  range_reversal:
    enabled: true
    min_confidence: 0.75
    rvol_min: 0.50
    rvol_max: 1.00
    va_proximity_pct: 0.20
    rsi:
      enabled: false
      period: 14
      overbought: 70
      oversold: 30
  cooldown:
    same_signal_minutes: 30
    max_per_session: 2
    max_per_day: 3
    per_type:
      BREAKOUT:
        max_per_session: 2
        max_per_day: 3
      RANGE_REVERSAL:
        max_per_session: 1
        max_per_day: 2
  override:
    confidence_increase: 0.10
    price_extension_pct: 0.50
    regime_upgrade: true

chase_risk:
  vwap_moderate_pct: 1.5
  vwap_high_pct: 2.5
  va_moderate_pct: 2.0
  va_high_pct: 3.0
  afternoon_tighten_pct: 0.3
  fade_entry_stale_moderate: 0.35
  fade_entry_stale_high: 0.55
  fade_momentum_lookback: 8
  fade_momentum_threshold: 0.03
  fade_direction_cooldown_minutes: 15
  local_trend_lookback: 30
  local_trend_threshold: 0.02
  min_va_width_pct: 0.80

option_recommend:
  dte_min: 1
  dte_preferred_max: 7
  delta_min: 0.30
  delta_max: 0.50
  min_oi: 100
  range_reversal:
    dte_min: 3
    dte_preferred_max: 10
    prefer_atm: true
    delta_min: 0.45
    delta_max: 0.65

market_tone:
  enabled: true
  cache_ttl: 120                    # 定调缓存 TTL (秒)

  orb:
    window_minutes: 30              # 开盘区间时长
    reversal_check_time: "10:00"    # 反转检查时间
    reversal_window_minutes: 15     # 反转窗口

  vwap:
    slope_lookback: 15              # 斜率回归 bar 数
    slope_flat_threshold: 0.005     # %/bar 以下视为 flat

  gap:
    small_threshold: 0.5            # <0.5% = gap fill
    large_threshold: 1.0            # >1.0% = gap and go

  breadth:
    basket:
      - SPY
      - QQQ
      - IWM
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
      - META
      - TSLA
    alignment_strong: 0.75
    alignment_weak: 0.50

  vix:
    enabled: true
    caution_surge_pct: 5.0
    supportive_drop_pct: 3.0
    cache_ttl: 300

  grade:
    fomc_max_grade: "B"
    confidence_modifiers:
      "A+": 0.10
      "A": 0.05
      "B+": 0.0
      "B": -0.05
      "C": -0.10
      "D": -0.15
    auto_scan_gates:
      "D": "skip"
      "C": "range_reversal_only"
    event_day:
      fomc_trend_unlock_time: "14:00"
      data_scan_start_time: "10:00"

regime_stabilizer:
  enabled: false                     # 灰度开关
  hysteresis_ratio: 0.30             # Layer 1: (trend-fade gap) * ratio
  hold_upgrade_minutes: 15           # FADE/UNCLEAR → TREND/GAP
  hold_downgrade_minutes: 30         # TREND/GAP → FADE
  hold_from_unclear_minutes: 10      # UNCLEAR → any
  bypass_confidence_delta: 0.20      # delta >= 0.20 bypass all holds

wide_va:
  enabled: true
  threshold: 1.8                    # VA width / ADR ratio threshold
  vwap_band_std: 1.0               # VWAP ± N σ
  intraday_vp_min_bars: 120         # intraday VP minimum bars (~2h)
  intraday_vp_value_area_pct: 0.70  # intraday VP value area %
  vwap_bands_min_bars: 15           # VWAP bands minimum bars (~15min)
  min_band_width_pct: 0.002         # bands min width (0.2%), below → None

trend_downgrade_confidence: 0.70  # wait + confidence < 此值 + TREND/GAP → 降级为 UNCLEAR plans

hist_cache_ttl: 120  # VP/历史 K 线缓存 TTL（秒）

simulation:
  tp_pct: 0.5
  sl_pct: 0.25
  slippage_per_leg: 0.03
  exit_mode: trailing
  trailing_activation_pct: 0.4
  trailing_trail_pct: 0.2
  exclude_symbols: []
  skip_signal_types: []
