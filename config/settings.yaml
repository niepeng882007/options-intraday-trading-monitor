data_source: futu

futu:
  host: "127.0.0.1"
  port: 11111
  use_push_subscription: true
  subscription_quota: 300
  reconnect_interval_seconds: 5

redis:
  url: "redis://localhost:6379"
  max_connections: 10

polling:
  stock_quote_interval_seconds: 10
  option_chain_interval_seconds: 60
  history_interval_seconds: 60

watchlist:
  symbols:
    - AAPL
    - TSLA
    - SPY
    - QQQ
    - NVDA
    - META
    - AMD
    - AMZN

trading_hours:
  pre_market_minutes: 30
  market_open: "09:30"
  market_close: "16:00"
  timezone: "America/New_York"

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  max_notifications_per_minute: 10

rate_limit:
  max_requests_per_hour: 1500
  backoff_base_seconds: 1
  backoff_max_seconds: 60

sqlite:
  db_path: "data/monitor.db"

risk_management:
  midday_no_trade:
    enabled: true
    start: "11:00"
    end: "13:00"
  max_daily_loss_pct: -1.5
  account_size: 10000
  risk_per_trade_pct: 0.02
  default_option_price_est: 2.00

strategies_dir: "config/strategies"
