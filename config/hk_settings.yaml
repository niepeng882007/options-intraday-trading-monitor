# HK Predict Module Configuration
# Reuses Futu connection from main settings.yaml (same host/port)

futu:
  host: "127.0.0.1"
  port: 11111
  use_push_subscription: true
  reconnect_interval_seconds: 5

trading_hours:
  timezone: "Asia/Hong_Kong"
  sessions:
    morning:
      open: "09:30"
      close: "12:00"
    afternoon:
      open: "13:00"
      close: "16:00"

watchlist:
  indices:
    - symbol: "HK.800000"
      name: "HSI"
    - symbol: "HK.800700"
      name: "HSTECH"
  stocks:
    - symbol: "HK.00700"
      name: "Tencent"
    - symbol: "HK.09988"
      name: "Alibaba"
    - symbol: "HK.03690"
      name: "Meituan"
    - symbol: "HK.01211"
      name: "BYD"
    - symbol: "HK.09618"
      name: "JD.com"
    - symbol: "HK.00941"
      name: "China Mobile"

volume_profile:
  lookback_days: 5
  value_area_pct: 0.70

rvol:
  lookback_days: 10
  sessions:
    morning:
      start: "09:30"
      end: "12:00"
    afternoon:
      start: "13:00"
      end: "16:00"

regime:
  breakout_rvol: 1.05
  range_rvol: 0.85
  iv_spike_ratio: 1.3
  momentum_min_dist_pct: 1.0  # VA 边界距离 >= 1% 触发动量突破

simulation:
  tp_pct: 0.8
  sl_pct: 0.3
  slippage_per_leg: 0.05
  exit_mode: "trailing"
  trailing_activation_pct: 0.5
  trailing_trail_pct: 0.3
  exclude_symbols:
    - "HK.800000"
    - "HK.00941"
    - "HK.800700"
    - "HK.09988"
  skip_signal_types:
    - "BREAKOUT_long"
    - "BREAKOUT_short"
    - "RANGE_long"

chase_risk:
  vwap_moderate_pct: 2.0       # VWAP deviation >= 2% → moderate
  vwap_high_pct: 3.5            # VWAP deviation >= 3.5% → high
  va_moderate_pct: 2.5          # VA boundary distance >= 2.5% → moderate
  va_high_pct: 4.0              # VA boundary distance >= 4.0% → high
  afternoon_tighten_pct: 0.5    # Tighten thresholds by 0.5% after 12:00 HKT

auto_scan:
  enabled: true
  interval_seconds: 180              # Scan every 3 minutes
  morning_window: ["09:35", "12:00"]
  afternoon_window: ["13:05", "15:45"]

  # BREAKOUT signal thresholds (both sessions)
  breakout:
    min_confidence: 0.72
    min_rvol: 1.35
    min_magnitude_pct: 0.15        # % beyond VA boundary
    volume_surge_threshold: 2.0    # x median for volume surge
    volume_surge_bars: 5           # recent N bars to check

  # RANGE signal thresholds (morning only)
  range:
    min_confidence: 0.72
    rvol_min: 0.55
    rvol_max: 0.90
    va_proximity_pct: 0.30         # % distance to VAH/VAL

  # Frequency control
  cooldown:
    same_signal_minutes: 30        # same symbol+direction+regime
    max_per_session: 2             # same symbol per session
    max_per_day: 3                 # same symbol per day

  # Override thresholds (bypass cooldown)
  override:
    confidence_increase: 0.10
    price_extension_pct: 0.50
    regime_upgrade: true           # RANGE -> BREAKOUT

playbook:
  push_times: ["09:35", "10:05", "13:05"]
  timezone: "Asia/Hong_Kong"

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  max_notifications_per_minute: 10

filters:
  min_turnover_hkd: 100000000       # 1亿 HKD
  expiry_risk_days: 0                # 当天到期视为高风险

order_book:
  large_order_ratio: 3.0             # 3x average size = large order
  monitor_depth: 10                  # monitor top 10 levels
  alert_cooldown_minutes: 15         # re-alert after cooldown if still present
  volume_change_threshold: 0.5       # re-alert if volume changes ≥50%
  seen_order_expiry_minutes: 60      # forget order after gone for 60min

gamma_wall:
  enabled_for_index_only: true
  top_n_strikes: 5
  index_symbols:
    - "HK.800000"
    - "HK.800700"

sqlite:
  db_path: "data/hk_predict.db"

calendar_file: "config/hk_calendar.yaml"
