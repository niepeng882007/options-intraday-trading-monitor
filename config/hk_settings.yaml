# HK Predict Module Configuration
# Reuses Futu connection from main settings.yaml (same host/port)

futu:
  host: "127.0.0.1"
  port: 11111
  use_push_subscription: true
  reconnect_interval_seconds: 5

trading_hours:
  timezone: "Asia/Hong_Kong"
  sessions:
    morning:
      open: "09:30"
      close: "12:00"
    afternoon:
      open: "13:00"
      close: "16:00"

watchlist:
  indices:
    - symbol: "HK.800000"
      name: "HSI"
    - symbol: "HK.800700"
      name: "HSTECH"
  stocks:
    - symbol: "HK.00700"
      name: "Tencent"
    - symbol: "HK.09988"
      name: "Alibaba"
    - symbol: "HK.03690"
      name: "Meituan"
    - symbol: "HK.01211"
      name: "BYD"
    - symbol: "HK.09618"
      name: "JD.com"
    - symbol: "HK.00941"
      name: "China Mobile"

volume_profile:
  lookback_days: 5
  value_area_pct: 0.70

rvol:
  lookback_days: 10
  sessions:
    morning:
      start: "09:30"
      end: "12:00"
    afternoon:
      start: "13:00"
      end: "16:00"

regime:
  breakout_rvol: 1.05
  range_rvol: 0.95
  iv_spike_ratio: 1.3

simulation:
  tp_pct: 0.8
  sl_pct: 0.3
  slippage_per_leg: 0.05
  exit_mode: "trailing"
  trailing_activation_pct: 0.5
  trailing_trail_pct: 0.3
  exclude_symbols:
    - "HK.800000"
    - "HK.00941"
  skip_signal_types:
    - "BREAKOUT_long"

playbook:
  push_times: ["09:35", "10:05", "13:05"]
  timezone: "Asia/Hong_Kong"

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  max_notifications_per_minute: 10

filters:
  min_turnover_hkd: 100000000       # 1亿 HKD
  expiry_risk_days: 0                # 当天到期视为高风险

order_book:
  large_order_ratio: 3.0             # 3x average size = large order
  monitor_depth: 10                  # monitor top 10 levels

gamma_wall:
  enabled_for_index_only: true
  top_n_strikes: 5
  index_symbols:
    - "HK.800000"
    - "HK.800700"

sqlite:
  db_path: "data/hk_predict.db"

calendar_file: "config/hk_calendar.yaml"
