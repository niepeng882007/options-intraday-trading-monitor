strategy_id: "extreme-oversold-reversal"
name: "极端超卖钝化反转"
enabled: false
description: >
  标的快速急跌后，15 分钟 RSI 跌破 30（真正极端超卖）且价格偏离 VWAP 超过 1.2%，
  放量反弹 + K 线反转确认，动能衰竭触发均值回归。

watchlist:
  underlyings: ["QQQ", "TSLA", "AMD"]
  option_filter:
    type: "call"
    max_dte: 3
    moneyness: "ITM"
    min_volume: 50
    max_spread_pct: 0.15

trading_window:
  start: "09:45"
  end: "11:00"
  timezone: "US/Eastern"

entry_conditions:
  operator: "AND"
  rules:
    # 15m RSI 真正极端超卖 (< 30)，回到极端值
    - indicator: "RSI"
      field: "value"
      comparator: "<"
      threshold: 30
      timeframe: "15m"

    # 价格偏离 VWAP 超过 -1.2%（收紧，Futu 精度更高）
    - indicator: "PRICE"
      field: "vwap_distance_pct"
      comparator: "<"
      threshold: -0.8
      timeframe: "5m"

    # 反转确认（任一满足）：K 线反转 OR 放量反弹
    - operator: "OR"
      rules:
        - indicator: "PRICE"
          field: "close"
          comparator: ">"
          reference_field: "prev_bar_high"
          timeframe: "5m"
        - indicator: "PRICE"
          field: "volume_spike"
          comparator: ">"
          threshold: 1.3
          timeframe: "5m"

market_context_filters:
  max_spy_day_drop_pct: -2.5

time_penalty_enabled: true

exit_conditions:
  operator: "OR"
  rules:
    - type: "take_profit_pct"
      threshold: 0.008
    - type: "stop_loss_pct"
      threshold: -0.003
    - type: "time_exit"
      minutes_before_close: 15

option_selection:
  preference: "ITM Call"
  reason: "均值回归场景，ITM delta 高、时间价值衰减小"

exit_plan:
  stop_loss: "股票跌 0.3% 止损 (期权约 -20%~40%)"
  take_profit: "股票涨 0.8% 止盈 (期权约 +50%~100%)"
  time_exit: "收盘前 15 分钟强制退出"

sop_checklist:
  - "收到警报：急跌抛压耗尽，多头开始抵抗"
  - "在券商确认价格已止跌企稳且放量"
  - "买入 ITM Call"
  - "目标为均值回归反弹，不贪"

notification:
  cooldown_seconds: 1800
  priority: "high"

entry_quality_filters:
  min_score: 45
  max_rsi_15m: 38
  min_vwap_deviation_pct: 0.6
