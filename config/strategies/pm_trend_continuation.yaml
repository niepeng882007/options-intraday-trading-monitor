# ═══════════════════════════════════════════════════════════════════
# 策略二：午后趋势重启做多 (The "2 PM Trend Continuation")
# ═══════════════════════════════════════════════════════════════════
# 底层逻辑：中午 11:30-14:00 是垃圾时间，大盘横盘震荡，Theta 疯狂
#           损耗让期权变得极便宜。下午2点机构回归，顺着早盘方向再推
#           一波，Gamma 膨胀带来暴利。
#
# 【执行SOP】
# 1. 确认早盘趋势：今天早盘有明确单边趋势（如一路上涨），
#    价格稳在 VWAP 之上。
# 2. 入场信号：价格 > VWAP，5分钟K线收盘价向上交叉突破20 EMA，
#    MACD柱状图转正。
# 3. 期权选择：买入 OTM Call。
#
# 【止盈止损】
# 止损：浮亏20%砍仓。
# 止盈：浮盈30%止盈。
# ═══════════════════════════════════════════════════════════════════

strategy_id: "pm-trend-continuation"
name: "午后趋势重启做多 (2PM Trend Continuation)"
enabled: true

description: >
  中午横盘导致 Theta 疯狂损耗，期权变得极便宜。下午2点机构回归，
  顺着早盘方向再推一波。条件：价格 > VWAP，5分钟收盘价上穿20 EMA，
  MACD柱状图转正。买入OTM Call，止损-20%，止盈+30%。

exit_plan:
  stop_loss: "浮亏20%砍仓"
  take_profit: "浮盈30%止盈"

trading_window:
  start: "14:00"
  end: "15:00"
  timezone: "US/Eastern"
  note: "力量时间前奏 14:00-15:00，利用午间Theta损耗后期权极便宜的特性"

watchlist:
  underlyings: ["QQQ", "SPY", "TSLA", "NVDA"]
  option_filter:
    type: "call"
    max_dte: 0
    moneyness: "OTM"
    min_volume: 1000
    max_spread_pct: 0.12

entry_conditions:
  operator: "AND"
  rules:
    # 条件1：价格 > VWAP — 确认多头格局延续
    - indicator: "VWAP"
      params: {}
      field: "close_vs_vwap"
      comparator: ">"
      threshold: 0
      timeframe: "5m"

    # 条件2：5分钟K线收盘价向上交叉突破20 EMA
    - indicator: "EMA"
      params: { period: 20 }
      field: "close"
      comparator: "crosses_above"
      threshold: "ema_20"
      timeframe: "5m"

    # 条件3：MACD柱状图转正 — 午间低迷后动能重新启动
    - indicator: "MACD"
      params: { fast: 12, slow: 26, signal: 9 }
      field: "histogram"
      comparator: "turns_positive"
      timeframe: "5m"

entry_quality_filters:
  min_score: 60
  max_distance_from_vwap_pct: 0.8
  max_range_percentile: 75
  min_volume_ratio: 1.2

exit_conditions:
  operator: "OR"
  rules:
    - type: "stop_loss_pct"
      threshold: -0.20

    - type: "take_profit_pct"
      threshold: 0.30

    - type: "time_exit"
      minutes_before_close: 15

sop_checklist:
  - "确认早盘有明确单边趋势，价格稳在VWAP之上"
  - "等待14:00后，确认当前价格 > VWAP"
  - "确认5分钟K线收盘价向上交叉突破20 EMA"
  - "确认MACD柱状图由负转正"
  - "买入OTM Call，止损-20%，止盈+30%，收盘前15分钟强平"

option_selection:
  preference: "OTM Call（差2-3档）0DTE"
  reason: "中午Theta损耗后极便宜，Gamma爆炸时翻倍极快"

notification:
  cooldown_seconds: 60
  priority: "high"
