strategy_id: "ema-momentum-breakout"
name: "EMA 金叉动能追击 (Momentum Call)"
enabled: true
description: >
  右侧策略：EMA9 上穿 EMA21 + 价格在 VWAP 之上 + RSI 50-70 动能区间 + 放量。
  利用修复后的 crosses_above + reference_field 组合实现 EMA 交叉检测。

watchlist:
  underlyings: ["SPY", "QQQ", "AAPL", "NVDA", "TSLA", "META"]
  option_filter:
    type: "call"
    max_dte: 3
    moneyness: "ATM"
    min_volume: 100
    max_spread_pct: 0.15

trading_window:
  start: "10:00"
  end: "14:30"
  timezone: "US/Eastern"

entry_conditions:
  operator: "AND"
  rules:
    # EMA 金叉：EMA9 上穿 EMA21（5m 级别）
    - indicator: "EMA"
      field: "ema_9"
      comparator: "crosses_above"
      reference_field: "ema_21"
      timeframe: "5m"
      confirm_bars: 1

    # 价格在 VWAP 之上
    - indicator: "PRICE"
      field: "close"
      comparator: ">"
      reference_field: "vwap"
      timeframe: "5m"

    # RSI 在动能区间 50-70（不超买不超卖）
    - indicator: "RSI"
      field: "value"
      comparator: ">"
      threshold: 50
      timeframe: "5m"
    - indicator: "RSI"
      field: "value"
      comparator: "<"
      threshold: 70
      timeframe: "5m"

    # 放量确认：量比 > 1.0
    - indicator: "PRICE"
      field: "volume_ratio"
      comparator: ">"
      threshold: 1.0
      timeframe: "5m"

    # 爆量确认：量能突变 > 1.5x（防 IV Crush）
    - indicator: "PRICE"
      field: "volume_spike"
      comparator: ">"
      threshold: 1.5
      timeframe: "5m"

market_context_filters:
  min_adx: 20

exit_conditions:
  operator: "OR"
  rules:
    - type: "take_profit_pct"
      threshold: 0.005
    - type: "stop_loss_pct"
      threshold: -0.002
    - type: "time_exit"
      minutes_before_close: 15

option_selection:
  preference: "ATM Call"
  reason: "动能追击，ATM 平衡 Delta 和成本"

exit_plan:
  stop_loss: "股票跌 0.2% 止损 (期权约 -15%~25%)"
  take_profit: "股票涨 0.5% 止盈 (期权约 +30%~60%)"
  time_exit: "收盘前 15 分钟强制退出"

sop_checklist:
  - "收到警报：EMA 金叉 + 价格在 VWAP 之上"
  - "在券商确认 EMA9 确实上穿 EMA21"
  - "确认 RSI 在 50-70 动能区间"
  - "确认成交量放大"
  - "买入 ATM Call"

notification:
  cooldown_seconds: 1800
  priority: "high"

entry_quality_filters:
  min_score: 55
  prefer_high_volume: true
  min_volume_spike: 1.2
