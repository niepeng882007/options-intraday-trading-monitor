# ═══════════════════════════════════════════════════════════════════
# 策略一：突破回踩确认做多 (The "Break & Retest")
# ═══════════════════════════════════════════════════════════════════
# 底层逻辑：关键阻力位被突破后，阻力变支撑。散户追涨后机构砸盘洗盘
#           （回踩），洗盘结束后的第二波拉升才是主升浪。
#
# 【执行SOP】
# 1. 观察突破：开盘后大盘放量突破盘前高点（PMH）或前30分钟高点，
#    此时绝对不买，忍住！
# 2. 等待回踩：价格冲高后回落，跌回刚才突破的关键点位附近。
# 3. 入场信号：K线出现锤子线(Hammer)或看涨吞没，且收盘价 > VWAP，
#    同时成交量 > 前值。
# 4. 期权选择：买入 ATM Call。
#
# 【止盈止损】
# 止损：浮亏20%立刻砍仓。
# 止盈：浮盈30%止盈。
# ═══════════════════════════════════════════════════════════════════

strategy_id: "break-and-retest"
name: "突破回踩确认做多 (Break & Retest)"
enabled: true

description: >
  关键阻力位被突破后，阻力变支撑。等待回踩确认后入场：
  K线出现锤子线或看涨吞没，收盘价站上VWAP，成交量放大确认。
  买入ATM Call，止损-20%，止盈+30%。

exit_plan:
  stop_loss: "浮亏20%立刻砍仓"
  take_profit: "浮盈30%止盈"

trading_window:
  start: "10:00"
  end: "11:30"
  timezone: "US/Eastern"
  note: "最佳窗口 10:00-11:30 AM ET，开盘前30分钟等待形成参考高点"

watchlist:
  underlyings: ["QQQ", "SPY", "TSLA", "NVDA"]
  option_filter:
    type: "call"
    max_dte: 3
    moneyness: "ATM"
    min_volume: 500
    max_spread_pct: 0.10

entry_conditions:
  operator: "AND"
  rules:
    # 条件1：K线形态 — 锤子线(Hammer)或看涨吞没(Bullish Engulfing)
    - indicator: "CANDLESTICK"
      params: {}
      field: "pattern"
      comparator: "in"
      threshold: ["hammer", "bullish_engulfing"]
      timeframe: "5m"

    # 条件2：收盘价 > VWAP — 确认价格站上多空分界线
    - indicator: "VWAP"
      params: {}
      field: "close_vs_vwap"
      comparator: ">"
      threshold: 0
      timeframe: "5m"

    # 条件3：成交量 > 前一根K线成交量 — 放量确认
    - indicator: "VOLUME"
      params: {}
      field: "current"
      comparator: ">"
      threshold: "previous"
      timeframe: "5m"

entry_quality_filters:
  min_score: 60
  max_distance_from_vwap_pct: 0.5
  max_range_percentile: 65
  max_distance_from_day_low_pct: 2.0
  min_volume_ratio: 1.0

exit_conditions:
  operator: "OR"
  rules:
    - type: "stop_loss_pct"
      threshold: -0.20

    - type: "take_profit_pct"
      threshold: 0.30

    - type: "time_exit"
      minutes_before_close: 15

sop_checklist:
  - "确认PMH或前30分钟高点已被放量突破"
  - "等待价格回踩至突破点位附近（不追高）"
  - "K线出现锤子线(Hammer)或看涨吞没(Bullish Engulfing)"
  - "确认收盘价 > VWAP"
  - "确认成交量 > 前一根K线成交量"
  - "买入ATM Call，止损-20%，止盈+30%，收盘前15分钟强平"

option_selection:
  preference: "ATM Call"
  reason: "回踩确认后需要高Delta快速捕捉反弹"

notification:
  cooldown_seconds: 120
  priority: "high"
