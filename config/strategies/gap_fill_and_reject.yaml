# ═══════════════════════════════════════════════════════════════════
# 策略三：缺口拒绝做多 (The "Gap Reject Long")
# ═══════════════════════════════════════════════════════════════════
# 底层逻辑：美股极其喜欢"补缺口"。跳空开盘后价格回测昨日收盘价（YDC），
#           YDC 是图表上最强大的磁铁和心理防线。价格触碰 YDC 但未有效
#           跌破，在超卖区反弹，是经典的均值回归做多机会。
#
# 【执行SOP】
# 1. 确认存在跳空缺口，价格回测至昨日收盘价（YDC）附近。
# 2. 入场信号：价格触及YDC但未有效跌破，当前5分钟K线收盘价重新 > YDC，
#    RSI < 40（超卖反弹）。
# 3. 期权选择：买入 ATM Call。
#
# 【止盈止损】
# 止损：浮亏25%砍仓。
# 止盈：浮盈20%止盈。
# ═══════════════════════════════════════════════════════════════════

strategy_id: "gap-fill-and-reject"
name: "缺口拒绝做多 (Gap Reject Long)"
enabled: true

description: >
  价格触及昨日收盘价(YDC)但未有效跌破，当前5分钟K线收盘价重新站上YDC，
  RSI处于超卖区(<40)确认反弹动能。买入ATM Call，止损-25%，止盈+20%。

exit_plan:
  stop_loss: "浮亏25%砍仓"
  take_profit: "浮盈20%止盈"

trading_window:
  start: "09:45"
  end: "11:00"
  timezone: "US/Eastern"
  note: "缺口填补通常在开盘后30-90分钟内完成，09:45-11:00 AM ET"

watchlist:
  underlyings: ["QQQ", "SPY", "TSLA", "NVDA"]
  option_filter:
    type: "call"
    max_dte: 0
    moneyness: "ATM"
    min_volume: 1000
    max_spread_pct: 0.08

entry_conditions:
  operator: "AND"
  rules:
    # 条件1：价格触及YDC但未有效跌破 — 5分钟K线最低价曾触及YDC区域
    - indicator: "PRICE_LEVEL"
      params: { reference: "previous_close" }
      field: "low"
      comparator: "touches_without_breaking"
      threshold: "previous_close"
      timeframe: "5m"

    # 条件2：当前5分钟K线收盘价重新 > 昨日收盘价(YDC)
    - indicator: "PRICE_LEVEL"
      params: { reference: "previous_close" }
      field: "close"
      comparator: ">"
      threshold: "previous_close"
      timeframe: "5m"

    # 条件3：RSI < 40 — 超卖反弹区域
    - indicator: "RSI"
      params: { period: 14 }
      field: "value"
      comparator: "<"
      threshold: 40
      timeframe: "5m"

entry_quality_filters:
  min_score: 60
  max_distance_from_vwap_pct: 0.3
  max_range_percentile: 45
  max_rsi_at_entry: 45
  min_volume_ratio: 0.8

exit_conditions:
  operator: "OR"
  rules:
    - type: "stop_loss_pct"
      threshold: -0.25

    - type: "take_profit_pct"
      threshold: 0.20

    - type: "time_exit"
      minutes_before_close: 15

sop_checklist:
  - "确认存在跳空缺口，价格回测至YDC附近"
  - "确认价格触及YDC但未有效跌破（下影线触及但实体未破）"
  - "确认当前5分钟K线收盘价重新 > 昨日收盘价"
  - "确认RSI < 40（超卖反弹区域）"
  - "买入ATM Call，止损-25%，止盈+20%，收盘前15分钟强平"

option_selection:
  preference: "ATM Call 0DTE"
  reason: "需要高Delta迅速捕捉YDC反弹，0DTE的Gamma最大化反弹收益"

notification:
  cooldown_seconds: 60
  priority: "high"
