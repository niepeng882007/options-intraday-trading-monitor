strategy_id: "breakdown-vwap-put"
name: "VWAP 跌破追空 (Breakdown Put)"
enabled: true
description: >
  右侧策略：VWAP 突破追涨的空头镜像。价格从 VWAP 上方向下跌破 + 放量 + MACD 负向。
  Futu 低延迟解锁的经典跌破策略。

watchlist:
  underlyings: ["SPY", "QQQ", "AAPL"]
  option_filter:
    type: "put"
    max_dte: 2
    moneyness: "ATM"
    min_volume: 100
    max_spread_pct: 0.15

trading_window:
  start: "10:00"
  end: "14:30"
  timezone: "US/Eastern"

entry_conditions:
  operator: "AND"
  rules:
    # 跌破信号：价格下穿 VWAP（1m 级别捕捉最快信号）
    - indicator: "PRICE"
      field: "close"
      comparator: "crosses_below"
      reference_field: "vwap"
      timeframe: "5m"
      confirm_bars: 1

    # 放量确认：量能突变 > 1.3x
    - indicator: "PRICE"
      field: "volume_spike"
      comparator: ">"
      threshold: 1.3
      timeframe: "5m"

    # 动能确认：MACD 柱状图为负（5m 级别）
    - indicator: "MACD"
      field: "histogram"
      comparator: "<"
      threshold: 0
      timeframe: "5m"

    # 非大涨日：日内涨幅不超过 0.3%
    - indicator: "PRICE"
      field: "day_change_pct"
      comparator: "<"
      threshold: 0.3
      timeframe: "5m"

exit_conditions:
  operator: "OR"
  rules:
    - type: "take_profit_pct"
      threshold: 0.004
    - type: "stop_loss_pct"
      threshold: -0.0015
    - type: "time_exit"
      minutes_before_close: 15

option_selection:
  preference: "ATM Put"
  reason: "跌破追空，ATM Put Delta 足够"

exit_plan:
  stop_loss: "股票跌 0.15% 止损 (期权约 -10%~20%)"
  take_profit: "股票涨 0.4% 止盈 (期权约 +25%~50%)"
  time_exit: "收盘前 15 分钟强制退出"

sop_checklist:
  - "收到警报：VWAP 跌破 + 放量确认"
  - "在券商确认跌破有效（非假跌破反弹）"
  - "确认 MACD 柱状图为负"
  - "买入 ATM Put"
  - "止损设在期权 -15%"

notification:
  cooldown_seconds: 300
  priority: "high"

entry_quality_filters:
  min_score: 55
  prefer_high_volume: true
  min_volume_spike: 1.5
