strategy_id: "aapl-rsi-bounce"
name: "AAPL RSI 超卖反弹"
enabled: true

description: >
  RSI 跌入超卖区（<30）后上穿30，叠加 MACD 柱状图转正，
  表明短期抛压耗尽、多头动能回归，捕捉技术性超卖反弹。

exit_plan:
  stop_loss: "浮亏20%立刻砍仓"
  take_profit: "浮盈50%止盈"

sop_checklist:
  - "确认RSI从超卖区（<30）上穿30"
  - "确认MACD柱状图由负转正"
  - "买入ATM Call，DTE≤7天"
  - "止损-20%，止盈+50%，收盘前15分钟强平"

option_selection:
  preference: "ATM Call，DTE ≤ 7天"
  reason: "高Delta捕捉超卖反弹，适中DTE避免过快Theta损耗"

watchlist:
  underlyings: ["QQQ", "SPY", "TSLA", "NVDA"]
  option_filter:
    type: "call"
    max_dte: 7
    moneyness: "ATM"
    min_volume: 100
    max_spread_pct: 0.15

entry_conditions:
  operator: "AND"
  rules:
    - indicator: "RSI"
      params: { period: 14 }
      field: "value"
      comparator: "crosses_above"
      threshold: 30
      timeframe: "5m"

    - indicator: "MACD"
      params: { fast: 12, slow: 26, signal: 9 }
      field: "histogram"
      comparator: "turns_positive"
      timeframe: "5m"

entry_quality_filters:
  min_score: 60
  max_distance_from_vwap_pct: 0.5
  max_range_percentile: 50
  max_rsi_at_entry: 45
  max_distance_from_day_low_pct: 2.0
  min_volume_ratio: 0.8

exit_conditions:
  operator: "OR"
  rules:
    - type: "take_profit_pct"
      threshold: 0.50

    - type: "stop_loss_pct"
      threshold: -0.20

    - type: "time_exit"
      minutes_before_close: 15

notification:
  cooldown_seconds: 120
  priority: "high"
