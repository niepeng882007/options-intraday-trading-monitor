strategy_id: "spy-vwap-ambush"
name: "SPY VWAP 缩量埋伏"
enabled: false
description: >
  价格趴在 VWAP 附近且 K 线波动极小（死水微澜），在缩量横盘中从容埋伏。
  使用 ATM/ITM 期权抵抗延迟期的时间损耗。

watchlist:
  underlyings: ["SPY"]
  option_filter:
    type: "call"
    max_dte: 0
    moneyness: "ATM_ITM"
    min_volume: 100
    max_spread_pct: 0.15

trading_window:
  start: "10:15"
  end: "14:00"
  timezone: "US/Eastern"

entry_conditions:
  operator: "AND"
  rules:
    # 非空头日过滤：日内跌幅不超过 0.3%
    - indicator: "PRICE"
      field: "day_change_pct"
      comparator: ">"
      threshold: -0.3
      timeframe: "5m"

    # 条件 1（趋势）：5m 价格 > EMA 50
    - indicator: "PRICE"
      field: "close"
      comparator: ">"
      reference_field: "ema_50"
      timeframe: "5m"

    # 条件 2（区域）：5m 价格在 VWAP 的 0.1% 范围内
    - indicator: "PRICE"
      field: "close"
      comparator: "within_pct_of"
      reference_field: "vwap"
      threshold: 0.0008
      timeframe: "5m"

    # 条件 3（动能枯竭）：5m K 线高低价差 < 0.12%（收紧）
    - indicator: "CANDLE"
      field: "spread_pct"
      comparator: "<"
      threshold: 0.12
      timeframe: "5m"

    # 条件 4（缩量确认）：量比 < 0.7
    - indicator: "PRICE"
      field: "volume_ratio"
      comparator: "<"
      threshold: 0.7
      timeframe: "5m"

market_context_filters:
  max_spy_day_drop_pct: -1.0
  max_adx: 30

time_penalty_enabled: true

exit_conditions:
  operator: "OR"
  rules:
    - type: "stop_loss_pct"
      threshold: -0.003
    - type: "take_profit_pct"
      threshold: 0.005
    - type: "time_exit"
      minutes_before_close: 15

option_selection:
  preference: "ATM 或 ITM Call"
  reason: "平值/实值期权抵抗延迟期 Theta 损耗，Delta 更高效"

exit_plan:
  stop_loss: "股票跌 0.3% 止损 (期权约 -20%~40%)"
  take_profit: "股票涨 0.5% 止盈 (期权约 +30%~80%)"
  time_exit: "收盘前 15 分钟强制退出"

sop_checklist:
  - "收到警报后打开券商实时数据"
  - "确认价格仍在 VWAP 附近磨蹭、K 线极小、未爆发"
  - "买入 ATM 或 ITM Call"
  - "止损设在期权 -20%"

notification:
  cooldown_seconds: 180
  priority: "high"

entry_quality_filters:
  min_score: 60
  prefer_low_volume: true
  max_distance_from_vwap_pct: 0.15
  max_candle_body_pct: 0.08
