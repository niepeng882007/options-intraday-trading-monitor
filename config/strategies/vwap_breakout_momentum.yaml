strategy_id: "vwap-breakout-momentum"
name: "VWAP 突破追涨 (Breakout Call)"
enabled: false
description: >
  右侧策略：价格从 VWAP 下方向上突破 + 放量确认 + MACD 正向动能。
  Futu 低延迟解锁的经典突破策略，Yahoo 延迟下无法执行。

watchlist:
  underlyings: ["SPY", "QQQ", "AAPL", "NVDA"]
  option_filter:
    type: "call"
    max_dte: 0
    moneyness: "ATM"
    min_volume: 100
    max_spread_pct: 0.15

trading_window:
  start: "09:45"
  end: "14:30"
  timezone: "US/Eastern"

entry_conditions:
  operator: "AND"
  rules:
    # 突破信号：价格上穿 VWAP（1m 级别捕捉最快信号）
    - indicator: "PRICE"
      field: "close"
      comparator: "crosses_above"
      reference_field: "vwap"
      timeframe: "5m"
      confirm_bars: 1

    # 放量确认：量能突变 > 1.3x（前3根均量）
    - indicator: "PRICE"
      field: "volume_spike"
      comparator: ">"
      threshold: 1.3
      timeframe: "5m"

    # 动能确认：MACD 柱状图为正（5m 级别过滤噪音）
    - indicator: "MACD"
      field: "histogram"
      comparator: ">"
      threshold: 0
      timeframe: "5m"

    # 非深跌日：日内跌幅不超过 0.5%
    - indicator: "PRICE"
      field: "day_change_pct"
      comparator: ">"
      threshold: -0.5
      timeframe: "5m"

exit_conditions:
  operator: "OR"
  rules:
    - type: "take_profit_pct"
      threshold: 0.004
    - type: "stop_loss_pct"
      threshold: -0.002
    - type: "time_exit"
      minutes_before_close: 15

option_selection:
  preference: "ATM Call"
  reason: "突破追涨，ATM Delta 最高效"

exit_plan:
  stop_loss: "股票跌 0.2% 止损 (期权约 -15%~25%)"
  take_profit: "股票涨 0.4% 止盈 (期权约 +25%~50%)"
  time_exit: "收盘前 15 分钟强制退出"

sop_checklist:
  - "收到警报：VWAP 突破 + 放量确认"
  - "在券商确认突破有效（非假突破回落）"
  - "确认 MACD 柱状图为正"
  - "买入 ATM Call"
  - "止损设在期权 -15%"

notification:
  cooldown_seconds: 300
  priority: "high"

entry_quality_filters:
  min_score: 55
  prefer_high_volume: true
  min_volume_spike: 1.5
