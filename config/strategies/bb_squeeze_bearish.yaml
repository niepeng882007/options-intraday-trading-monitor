strategy_id: "bb-squeeze-bearish"
name: "午后挤压久盘必跌 (PM Bearish Squeeze Put)"
enabled: true
description: >
  午后长时间极度枯燥横盘，全天大趋势偏空。
  布林带宽度极度收缩时期权极便宜（IV 冰点 + Theta 耗干），提前进场赌向下爆发。

watchlist:
  underlyings: ["SPY", "AAPL", "NVDA", "AMZN"]
  option_filter:
    type: "put"
    max_dte: 2
    moneyness: "ATM"
    min_volume: 100
    max_spread_pct: 0.15

trading_window:
  start: "13:00"
  end: "14:45"
  timezone: "US/Eastern"

entry_conditions:
  operator: "AND"
  rules:
    # 条件 1（极度挤压）：布林带宽度百分位数 < 10%（改用相对值）
    - indicator: "BOLLINGER"
      field: "width_percentile"
      comparator: "<"
      threshold: 10
      timeframe: "5m"

    # 条件 2（偏空确认）：价格 < VWAP
    - indicator: "PRICE"
      field: "close"
      comparator: "<"
      reference_field: "vwap"
      timeframe: "5m"

    # 条件 3（均线压制）：价格 < EMA 21
    - indicator: "PRICE"
      field: "close"
      comparator: "<"
      reference_field: "ema_21"
      timeframe: "5m"

    # 条件 4（空头动能）：MACD 柱状图 < 0（新增）
    - indicator: "MACD"
      field: "histogram"
      comparator: "<"
      threshold: -0.01
      timeframe: "5m"

    # 条件 5（弱势确认）：RSI < 40（收紧）
    - indicator: "RSI"
      field: "value"
      comparator: "<"
      threshold: 40
      timeframe: "5m"

market_context_filters:
  max_adx: 30
  max_spy_day_drop_pct: -1.0

time_penalty_enabled: true

exit_conditions:
  operator: "OR"
  rules:
    - type: "take_profit_pct"
      threshold: 0.015
    - type: "stop_loss_pct"
      threshold: -0.005
    - type: "time_exit"
      minutes_before_close: 15

option_selection:
  preference: "0DTE ATM Put"
  reason: "挤压期 IV 冰点 + Theta 已耗干，成本极低"

exit_plan:
  stop_loss: "股票跌 0.5% 止损 (期权约 -30%~50%)"
  take_profit: "股票涨 1.5% 止盈 (期权约 +100%~200%)"
  time_exit: "收盘前 15 分钟强制退出"

sop_checklist:
  - "收到警报：布林带极度挤压 + 偏空格局"
  - "确认盘面仍在横盘，无异常向上波动"
  - "确认价格在 VWAP 和 EMA 21 之下"
  - "以极低成本买入 0DTE ATM Put"
  - "等待午后方向性向下爆发"

notification:
  cooldown_seconds: 300
  priority: "high"

entry_quality_filters:
  min_score: 65
  max_bb_width_pct: 0.20
